    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1e293b;
        }

        /* Hero Banner */
        .hero {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 3rem 2rem;
            border-radius: 24px;
            margin-top: 25px;
            margin-bottom: 35px;
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.15);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .hero h1 {
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Search Box */
        .search-container {
            position: relative;
        }

        .search-box {
            border-radius: 50px;
            height: 54px;
            padding-left: 50px;
            border: 2px solid transparent;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            transition: all 0.3s ease;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-box:focus {
            background: white;
            color: #1e293b;
            border-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }

        .search-box:focus + .search-icon {
            color: #4f46e5;
        }

        /* Stat Cards */
        .stat-card {
            border: none;
            border-radius: 20px;
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.05) !important;
        }

        .stat-icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        /* Profile Student Cards */
        .student-card {
            border: none;
            border-radius: 24px;
            overflow: hidden;
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .student-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04) !important;
        }

        .card-header-custom {
            height: 100px;
            background: linear-gradient(135deg, #e0e7ff, #f3e8ff);
        }

        /* Avatar Layout */
        .student-avatar-container {
            width: 110px;
            height: 110px;
            margin: auto;
            margin-top: -55px;
            position: relative;
            z-index: 2;
        }

        .student-photo {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            background: white;
        }

        .student-initials {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            color: #fff;
            font-size: 34px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        /* Badges Positioning */
        .badge-percentile {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.8rem;
            background-color: #334155; 
            color: #f8fafc;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            z-index: 3;
        }

        .badge-percentage {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            background-color: #10b981; 
            color: white;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
            z-index: 3;
        }

        /* Marks styling container */
        .marks-container {
            background-color: #f1f5f9;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        /* View Result Button */
        .btn-view-result {
            background-color: #f1f5f9;
            color: #4f46e5;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-view-result:hover {
            background-color: #4f46e5;
            color: white;
        }

        /* Modern Modals */
        .modal-content {
            border: none;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .modal-header {
            border-bottom: 1px solid #f1f5f9;
            padding: 1.5rem;
        }

        .modal-body {
            background-color: #f8fafc;
        }

        iframe {
            border: none;
            border-radius: 12px;
            background-color: white;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
        }

        /* Empty State Layout */
        .empty-state {
            text-align: center;
            padding: 5rem 1rem;
            color: #64748b;
        }

        .empty-state i {
            font-size: 3.5rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
            display: block;
        }
        
        .text-indigo {
            color: #4f46e5;
        }

  .export-btn {

    color: #fff;
    border: none;
    border-radius: 50px;

function renderStudents(data) {
    const container = document.getElementById("studentContainer");
    container.innerHTML = "";

    if (data.length === 0) {
        container.innerHTML = `
            <div class="col-12">
                <div class="empty-state card border-0 shadow-sm rounded-4">
                    <i class="bi bi-person-exclamation"></i>
                    <h5 class="fw-bold text-dark">No Students Found</h5>
                    <p class="mb-0 text-muted">We couldn't find anyone matching your current search terms.</p>
                </div>
            </div>`;
        return;
    }

    data.forEach(student => {
        container.innerHTML += `
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
            <div class="card student-card shadow-sm position-relative h-100">
                <div class="card-header-custom"></div>
                
                <span class="badge badge-percentile">
                    PR: ${student.percentile}
                </span>

                <span class="badge badge-percentage">
                    ${student.percentage}%
                </span>

                <div class="card-body text-center pt-0">
                    <div class="student-avatar-container">
                        <img src="${student.photo}" class="student-photo" onerror="showInitials(this,'${student.name}')" alt="${student.name}">
                        <div class="student-initials d-none"></div>
                    </div>

                    <h6 class="mt-3 fw-bold text-dark text-truncate px-2 mb-1" title="${student.name}">
                        ${student.name}
                    </h6>

                    <p class="text-indigo small fw-semibold mb-2">
                        <i class="bi bi-geo-alt-fill me-1"></i>${student.village}
                    </p>

                    <p class="text-success small fw-semibold mb-2">
                        <i class="bi bi-telephone-fill me-1"></i>
                        <a href="tel:${student.contactNo}" class="text-decoration-none">
                            ${student.contactNo || 'N/A'}
                        </a>
                    </p>

                    <p class="text-muted small mb-2">
                        <span class="badge bg-light text-secondary rounded-pill px-2.5 py-1">Grade: ${student.grade}</span>
                        <span class="mx-1">•</span>
                        <span>${student.className}</span>
                    </p>

                    <div class="marks-container d-flex justify-content-around text-secondary fw-medium">
                        <div>Obtained: <span class="text-dark fw-bold">${student.obtainedMarks}</span></div>
                        <div class="text-muted">|</div>
                        <div>Total: <span class="text-dark fw-bold">${student.totalMarks}</span></div>
                    </div>

                    <button class="btn btn-view-result w-100 rounded-pill py-2" onclick="viewResult(${student.id})">
                        <i class="bi bi-file-earmark-text me-1"></i> View Result
                    </button>
                </div>
            </div>
        </div>`;
    });
}

function viewResult(id) {
    const student = students.find(x => x.id === id);
    if (!student) return;

    let html = '';
    if (student.type === 'pdf') {
        html = `<iframe src="${student.result}" width="100%" height="600" class="border-0"></iframe>`;
    } else {
        html = `<div class="text-center p-2"><img src="${student.result}" class="img-fluid rounded-3 shadow-sm" alt="Result Image"></div>`;
    }

    document.getElementById("modalTitle").innerText = student.name;
    document.getElementById("modalSubtitle").innerText = `${student.className} | Village: ${student.village} | Marks: ${student.obtainedMarks}/${student.totalMarks} | Grade: ${student.grade}`;
    document.getElementById("resultViewer").innerHTML = html;

    const modalEl = document.getElementById("resultModal");
    let modalInstance = bootstrap.Modal.getInstance(modalEl);
    if (!modalInstance) {
        modalInstance = new bootstrap.Modal(modalEl);
    }
    modalInstance.show();
}

function updateStats() {
    document.getElementById("totalStudents").innerText = students.length;

    const qualified = students.filter(x => x.percentage >= 70);
    document.getElementById("qualifiedStudents").innerText = qualified.length;

    const top = Math.max(...students.map(x => x.percentage));
    document.getElementById("topScore").innerText = top + "%";

    const success = Math.round((qualified.length / students.length) * 100);
    document.getElementById("successRate").innerText = success + "%";

    const classCounts = {};
    students.forEach(student => {
        let cls = student.className || "Unknown";
        classCounts[cls] = (classCounts[cls] || 0) + 1;
    });

    let breakdownHTML = "";
    for (const [className, count] of Object.entries(classCounts)) {
        breakdownHTML += `
            <span class="badge bg-light text-dark border align-middle px-2 py-1.5">
                <strong>${className}:</strong> ${count}
            </span>`;
    }
    document.getElementById("classBreakdown").innerHTML = breakdownHTML;
}

function getInitials(fullName) {
    const names = fullName.trim().split(' ');
    if (names.length === 1) {
        return names[0].charAt(0).toUpperCase();
    }
    return (names[0].charAt(0) + names[names.length - 1].charAt(0)).toUpperCase();
}

function showInitials(img, fullName) {
    const colors = ['#4f46e5', '#10b981', '#ef4444', '#f59e0b', '#8b5cf6', '#06b6d4'];
    img.style.display = "none";

    const initialsDiv = img.nextElementSibling;
    initialsDiv.innerHTML = getInitials(fullName);
    
    let charSum = 0;
    for(let i=0; i<fullName.length; i++) charSum += fullName.charCodeAt(i);
    initialsDiv.style.background = colors[charSum % colors.length];

    initialsDiv.classList.remove('d-none');
}

async function exportStyledExcel() {

    const workbook = new ExcelJS.Workbook();
    const worksheet = workbook.addWorksheet("Student Details");

    worksheet.mergeCells('A1:M1');

    const title = worksheet.getCell('A1');
    title.value = 'STUDENT RESULT DETAILS';
    title.font = {
        bold: true,
        size: 16
    };
    title.alignment = {
        horizontal: 'center',
        vertical: 'middle'
    };

    const headers = [
        "ID",
        "Student Name",
        "Grade",
        "Class",
        "Village",
        "Percentile",
        "Percentage (%)",
        "Obtained Marks",
        "Total Marks",
        "Contact Number"
    ];

    const headerRow = worksheet.addRow([]);
    worksheet.addRow(headers);

    const row = worksheet.getRow(3);

    row.eachCell(cell => {
        cell.font = {
            bold: true,
            color: { argb: 'FFFFFF' }
        };

        cell.fill = {
            type: 'pattern',
            pattern: 'solid',
            fgColor: { argb: '1F4E78' }
        };

        cell.alignment = {
            horizontal: 'center',
            vertical: 'middle'
        };
    });

    students.forEach(student => {
        worksheet.addRow([
            student.id,
            student.name,
            student.grade,
            student.className,
            student.village,
            student.percentile,
            student.percentage,
            student.obtainedMarks,
            student.totalMarks,
            student.contactNo
        ]);
    });

    worksheet.columns.forEach(column => {
        column.width = 25;
    });

    worksheet.eachRow(row => {
        row.eachCell(cell => {
            cell.alignment = {
                horizontal: 'center',
                vertical: 'middle',
                wrapText: true
            };

            cell.border = {
                top: { style: 'thin' },
                left: { style: 'thin' },
                bottom: { style: 'thin' },
                right: { style: 'thin' }
            };
        });
    });

    const buffer = await workbook.xlsx.writeBuffer();

    saveAs(
        new Blob([buffer]),
        'Students_Details.xlsx'
    );
}

function exportPDF() {

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF("landscape");

    // Title
    doc.setFontSize(18);
    doc.setTextColor(40, 40, 40);
    doc.text("STUDENT RESULT DETAILS", 14, 20);

    doc.setFontSize(10);
     doc.text("Academic Year (2026)", 14, 28);

    const tableData = students.map(student => [
        student.id,
        student.name,
        student.grade,
        student.className,
        student.village,
        student.percentage + "%",
        student.obtainedMarks,
        student.totalMarks,
        student.contactNo
    ]);

    doc.autoTable({
        startY: 35,

        head: [[
            "ID",
            "Student Name",
            "Grade",
            "Class",
            "Village",
            "Percentage",
            "Marks",
            "Total",
            "Contact"
        ]],

        body: tableData,

        theme: "grid",

        headStyles: {
            fillColor: [25, 135, 84],

            halign: "center"
        },

        bodyStyles: {
            halign: "center",
            valign: "middle"
        },

        styles: {

        }
    });

    doc.save("Students_Details.pdf");
}

document.getElementById("searchInput").addEventListener("input", function () {
    const keyword = this.value.toLowerCase().trim();
    filteredStudents = students.filter(student =>
        student.name.toLowerCase().includes(keyword) || 
        student.village.toLowerCase().includes(keyword)
    );
    renderStudents(filteredStudents);
});

// Sort students by percentage in descending order on load
students.sort((a, b) => b.percentage - a.percentage);

renderStudents(students);
updateStats();
