<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1e293b;
        }

        /* Hero Banner */
        .hero {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 4rem 2rem;
            border-radius: 24px;
            margin-top: 25px;
            margin-bottom: 35px;
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.15);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .hero h1 {
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Search Box */
        .search-container {
            position: relative;
        }

        .search-box {
            border-radius: 50px;
            height: 54px;
            padding-left: 50px;
            border: 2px solid transparent;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            transition: all 0.3s ease;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-box:focus {
            background: white;
            color: #1e293b;
            border-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }

        .search-box:focus + .search-icon {
            color: #4f46e5;
        }

        /* Stat Cards */
        .stat-card {
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.05) !important;
        }

        .stat-icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        /* Profile Student Cards */
        .student-card {
            border: none;
            border-radius: 24px;
            overflow: hidden;
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .student-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04) !important;
        }

        .card-header-custom {
            height: 100px;
            background: linear-gradient(135deg, #e0e7ff, #f3e8ff);
        }

        /* Avatar Layout */
        .student-avatar-container {
            width: 110px;
            height: 110px;
            margin: auto;
            margin-top: -55px;
            position: relative;
            z-index: 2;
        }

        .student-photo {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            background: white;
        }

        .student-initials {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            color: #fff;
            font-size: 36px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        /* Badges Positioning Update */
        .badge-percentile {
            position: absolute;
            top: 15px;
            left: 15px; /* Swapped to the left side */
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.8rem;
            background-color: #334155; 
            color: #f8fafc;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            z-index: 3;
        }

        .badge-percentage {
            position: absolute;
            top: 15px;
            right: 15px; /* Swapped to the right side */
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            background-color: #10b981; 
            color: white;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
            z-index: 3;
        }

        /* Marks styling container */
        .marks-container {
            background-color: #f1f5f9;
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        /* View Result Button */
        .btn-view-result {
            background-color: #f1f5f9;
            color: #4f46e5;
            border: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-view-result:hover {
            background-color: #4f46e5;
            color: white;
        }

        /* Modern Modals */
        .modal-content {
            border: none;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .modal-header {
            border-bottom: 1px solid #f1f5f9;
            padding: 1.5rem;
        }

        .modal-body {
            background-color: #f8fafc;
        }

        iframe {
            border: none;
            border-radius: 12px;
            background-color: white;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
        }

        /* Empty State Layout */
        .empty-state {
            text-align: center;
            padding: 5rem 1rem;
            color: #64748b;
        }

        .empty-state i {
            font-size: 3.5rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
            display: block;
        }
    </style>
</head>

<body>

<div class="container pb-5">

    <div class="hero">
        <div class="row align-items-center gy-4">
            <div class="col-lg-7 text-center text-lg-start">
                <h1 class="display-5 text-white mb-2">🏆 Student Achievement Portal (2026)</h1>
                <h5 class="text-white-50 fw-normal mb-3">Baagh E Anwaar Shinor</h5>
                <p class="mb-0 bg-white bg-opacity-10 d-inline-block px-3 py-2 rounded-pill text-white fs-10">
                    <i class="bi bi-info-circle me-1"></i> Showcasing outstanding student achievements with scores of 70% and above.
                </p>
            </div>
            <div class="col-lg-5">
                <div class="search-container">
                    <input type="text" id="searchInput" class="form-control search-box" placeholder="Search pupil by name or village...">
                    <i class="bi bi-search search-icon"></i>
                </div>
            </div>
        </div>
    </div>

<div class="row mb-5 g-3">
    <!-- Total Students Card -->
    <div class="col-6 col-md-4 col-lg-2">
        <div class="card stat-card shadow-sm h-100">
            <div class="card-body d-flex align-items-center p-3">
                <div class="stat-icon-wrapper bg-primary bg-opacity-10 text-primary me-2">
                    <i class="bi bi-people-fill"></i>
                </div>
                <div>
                    <h6 class="text-muted small mb-1 fw-medium">Total</h6>
                    <h4 class="mb-0 fw-bold text-dark" id="totalStudents">0</h4>
                </div>
            </div>
        </div>
    </div>

    <!-- Qualified Card -->
    <div class="col-6 col-md-4 col-lg-2">
        <div class="card stat-card shadow-sm h-100">
            <div class="card-body d-flex align-items-center p-3">
                <div class="stat-icon-wrapper bg-success bg-opacity-10 text-success me-2">
                    <i class="bi bi-patch-check-fill"></i>
                </div>
                <div>
                    <h6 class="text-muted small mb-1 fw-medium">Qualified</h6>
                    <h4 class="mb-0 fw-bold text-dark" id="qualifiedStudents">0</h4>
                </div>
            </div>
        </div>
    </div>

    <!-- Top Score Card -->
    <div class="col-6 col-md-4 col-lg-2">
        <div class="card stat-card shadow-sm h-100">
            <div class="card-body d-flex align-items-center p-3">
                <div class="stat-icon-wrapper bg-warning bg-opacity-10 text-warning me-2">
                    <i class="bi bi-trophy-fill"></i>
                </div>
                <div>
                    <h6 class="text-muted small mb-1 fw-medium">Top Score</h6>
                    <h4 class="mb-0 fw-bold text-dark" id="topScore">0%</h4>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Rate Card -->
    <div class="col-6 col-md-4 col-lg-2">
        <div class="card stat-card shadow-sm h-100">
            <div class="card-body d-flex align-items-center p-3">
                <div class="stat-icon-wrapper bg-info bg-opacity-10 text-info me-2">
                    <i class="bi bi-graph-up-arrow"></i>
                </div>
                <div>
                    <h6 class="text-muted small mb-1 fw-medium">Success %</h6>
                    <h4 class="mb-0 fw-bold text-dark" id="successRate">0%</h4>
                </div>
            </div>
        </div>
    </div>

    <!-- NEW: Class Distribution Card -->
    <div class="col-12 col-md-8 col-lg-4">
        <div class="card stat-card shadow-sm h-100">
            <div class="card-body d-flex align-items-center p-3">
                <div class="stat-icon-wrapper bg-dark bg-opacity-10 text-dark me-3">
                    <i class="bi bi-journal-bookmark-fill"></i>
                </div>
                <div class="w-100">
                    <h6 class="text-muted small mb-1 fw-medium">Class-wise Count</h6>
                    <div id="classBreakdown" class="d-flex flex-wrap gap-2 pt-1 small text-secondary">
                        <!-- Dynamic content will load here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <div class="row g-4" id="studentContainer"></div>

</div>

<div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-light align-items-center">
                <div>
                    <h5 class="modal-title fw-bold text-dark" id="modalTitle">Student Performance Card</h5>
                    <p class="text-muted small mb-0" id="modalSubtitle"></p>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-3" id="resultViewer"></div>
        </div>
    </div>
</div>

<script>
const students = [
    {
        id: 1,
        name: "SHANA ALTAFAHMED ZAFRULLAKHAN DAYMA",
        grade: "B1",
        className: "12th Science",
        village: "Vasan",
        percentile: 91.94,
        percentage: 96,
        obtainedMarks: 466,
        totalMarks: 700,
        photo: "images/rahul.jpg",
        result: "results/SHANA_ALTAFAHMED_ZAFRULLAKHAN_DAYMA.pdf",
        type: "pdf"
    },
    {
        id: 2,
        name: "ALIYABANU IMRANKHAN GHORI",
        grade: "-",
        className: "10th",
        village: "Chudeshwar",
        percentile: 92,
        percentage: 92,
        obtainedMarks: 460,
        totalMarks: 500,
        photo: "images/priya.jpg",
        result: "results/ALIYABANU_IMRANKHAN_GHORI.pdf",
        type: "pdf"
    },
    {
        id: 3,
        name: "HUMERABANU MAHMMADSOYEB GHORI",
        grade: "A2",
        className: "10th",
        village: "Chudeshwar",
        percentile: 92.54,
        percentage: 88,
        obtainedMarks: 524,
        totalMarks: 500,
        photo: "images/arjun.jpg",
        result: "results/HUMERABANU_MAHMMADSOYEB_GHORI.pdf",
        type: "pdf"
    },
    {
        id: 4,
        name: "KHUSHBUBANU ASIFMAHAMMAD AFGHAN",
        grade: "A2",
        className: "10th",
        village: "Vadiya",
        percentile: 92.73,
        percentage: 82,
        obtainedMarks: 525,
        totalMarks: 500,
        photo: "images/neha.jpg",
        result: "results/KHUSHBUBANU_ASIFMAHAMMAD_AFGHAN.pdf",
        type: "pdf"
    },
    {
        id: 5,
        name: "TAMILALI ASIFMAHAMMAD AFGHAN",
        grade: "A2",
        className: "12th Commerce",
        village: "Vadiya",
        percentile: 92,
        percentage: 75,
        obtainedMarks: 591,
        totalMarks: 700,
        photo: "images/amit.jpg",
        result: "results/TAMILALI_ASIFMAHAMMAD_AFGHAN.pdf",
        type: "pdf"
    },
    {
        id: 6,
        name: "MOHAMMADALHAN SALIMMAHAMMAD RATHOD",
        grade: "A2",
        className: "10th",
        village: "Naliya",
        percentile: 92,
        percentage: 75,
        obtainedMarks: 493,
        totalMarks: 700,
        photo: "images/amit.jpg",
        result: "results/MOHAMMADALHAN_SALIMMAHAMMAD_RATHOD.pdf",
        type: "pdf"
    },
    {
        id: 7,
        name: "SARABANU ILYASKHAN GHORI",
        grade: "B1",
        className: "10th",
        village: "Chudeshwar",
        percentile: 82.77,
        percentage: 75,
        obtainedMarks: 477,
        totalMarks: 700,
        photo: "images/amit.jpg",
        result: "results/SARABANU_ILYASKHAN_GHORI.pdf",
        type: "pdf"
    }
];

let filteredStudents = students;

// Calculates standard statistical percentile position based on dataset entries
function calculatePercentile(score, totalData) {
    const values = totalData.map(s => s.percentage);
    const countSlowerOrEqual = values.filter(v => v <= score).length;
    return Math.round((countSlowerOrEqual / values.length) * 100);
}

function renderStudents(data) {
    const container = document.getElementById("studentContainer");
    container.innerHTML = "";

    if (data.length === 0) {
        container.innerHTML = `
            <div class="col-12">
                <div class="empty-state card border-0 shadow-sm rounded-4">
                    <i class="bi bi-person-exclamation"></i>
                    <h5 class="fw-bold text-dark">No Students Found</h5>
                    <p class="mb-0 text-muted">We couldn't find anyone matching your current search terms.</p>
                </div>
            </div>`;
        return;
    }

    data.forEach(student => {
        // Dynamic calculations can fall back to array if data structure is missing
        const computedPercentile = calculatePercentile(student.percentage, students);
        const displayPercentile = student.percentile || computedPercentile;
        
        container.innerHTML += `
        <div class="col-xl-3 col-lg-4 col-md-6">
            <div class="card student-card shadow-sm position-relative h-100">
                <div class="card-header-custom"></div>
                
                <span class="badge badge-percentile">
                    Percentile: ${student.percentile}
                </span>

                <span class="badge badge-percentage">
                    ${student.percentage}%
                </span>

                <div class="card-body text-center pt-0">
                    <div class="student-avatar-container">
                        <img src="${student.photo}" class="student-photo" onerror="showInitials(this,'${student.name}')" alt="${student.name}">
                        <div class="student-initials d-none"></div>
                    </div>

                    <h6 class="mt-3 fw-bold text-dark text-truncate px-2 mb-1" title="${student.name}">
                        ${student.name}
                    </h6>

                    <p class="text-indigo small fw-semibold mb-2">
                        <i class="bi bi-geo-alt-fill me-1"></i>${student.village}
                    </p>

                    <p class="text-muted small mb-2">
                        <span class="badge bg-light text-secondary rounded-pill px-2.5 py-1">Grade: ${student.grade}</span>
                        <span class="mx-1">•</span>
                        <span>${student.className}</span>
                    </p>

                    <div class="marks-container d-flex justify-content-around text-secondary fw-medium">
                        <div>Obtained: <span class="text-dark fw-bold">${student.obtainedMarks}</span></div>
                        <div class="text-muted">|</div>
                        <div>Total: <span class="text-dark fw-bold">${student.totalMarks}</span></div>
                    </div>

                    <button class="btn btn-view-result w-100 rounded-pill py-2" onclick="viewResult(${student.id})">
                        <i class="bi bi-file-earmark-text me-1"></i> View Result
                    </button>
                </div>
            </div>
        </div>`;
    });
}

function viewResult(id) {
    const student = students.find(x => x.id === id);
    if (!student) return;

    let html = '';
    if (student.type === 'pdf') {
        html = `<iframe src="${student.result}" width="100%" height="600" class="border-0"></iframe>`;
    } else {
        html = `<div class="text-center p-2"><img src="${student.result}" class="img-fluid rounded-3 shadow-sm" alt="Result Image"></div>`;
    }

    document.getElementById("modalTitle").innerText = student.name;
    document.getElementById("modalSubtitle").innerText = `${student.className} | Village: ${student.village} | Marks: ${student.obtainedMarks}/${student.totalMarks} | Grade: ${student.grade}`;
    document.getElementById("resultViewer").innerHTML = html;

    const modalEl = document.getElementById("resultModal");
    let modalInstance = bootstrap.Modal.getInstance(modalEl);
    if (!modalInstance) {
        modalInstance = new bootstrap.Modal(modalEl);
    }
    modalInstance.show();
}

function updateStats() {
    // 1. Existing calculations
    document.getElementById("totalStudents").innerText = students.length;

    const qualified = students.filter(x => x.percentage >= 70);
    document.getElementById("qualifiedStudents").innerText = qualified.length;

    const top = Math.max(...students.map(x => x.percentage));
    document.getElementById("topScore").innerText = top + "%";

    const success = Math.round((qualified.length / students.length) * 100);
    document.getElementById("successRate").innerText = success + "%";

    // 2. NEW: Calculate and Display Class Distribution
    const classCounts = {};
    
    students.forEach(student => {
        let cls = student.className || "Unknown";
        // Clean up common variations like '10th' vs '10th Grade' if needed
        classCounts[cls] = (classCounts[cls] || 0) + 1;
    });

    // Generate badge HTML for each unique class found in the array
    let breakdownHTML = "";
    for (const [className, count] of Object.entries(classCounts)) {
        breakdownHTML += `
            <span class="badge bg-light text-dark border align-middle px-2 py-1.5">
                <strong>${className}:</strong> ${count}
            </span>`;
    }
    
    document.getElementById("classBreakdown").innerHTML = breakdownHTML;
}

function getInitials(fullName) {
    const names = fullName.trim().split(' ');
    if (names.length === 1) {
        return names[0].charAt(0).toUpperCase();
    }
    return (names[0].charAt(0) + names[names.length - 1].charAt(0)).toUpperCase();
}

function showInitials(img, fullName) {
    const colors = ['#4f46e5', '#10b981', '#ef4444', '#f59e0b', '#8b5cf6', '#06b6d4'];
    img.style.display = "none";

    const initialsDiv = img.nextElementSibling;
    initialsDiv.innerHTML = getInitials(fullName);
    
    let charSum = 0;
    for(let i=0; i<fullName.length; i++) charSum += fullName.charCodeAt(i);
    initialsDiv.style.background = colors[charSum % colors.length];

    initialsDiv.classList.remove('d-none');
}

document.getElementById("searchInput").addEventListener("input", function () {
    const keyword = this.value.toLowerCase().trim();
    filteredStudents = students.filter(student =>
        student.name.toLowerCase().includes(keyword) || 
        student.village.toLowerCase().includes(keyword)
    );
    renderStudents(filteredStudents);
});

// Initial load triggers
// Sort students by percentage in descending order (Highest to Lowest)
students.sort((a, b) => b.percentage - a.percentage);

// Initial load triggers
renderStudents(students);
updateStats();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
